<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>股票技术指标前置预判工具</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f3f4f6;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        function App() {
            const [inputValue, setInputValue] = useState('600519.SH');
            const [selectedSymbol, setSelectedSymbol] = useState('600519.SH');
            const [matrix, setMatrix] = useState(null);
            const [currentPrice, setCurrentPrice] = useState(0);
            const [isLoading, setIsLoading] = useState(false);
            const [error, setError] = useState(null);

            const API_BASE = 'http://localhost:8000';

            // 加载矩阵数据
            const loadMatrix = useCallback(async (symbol) => {
                if (!symbol) return;

                setIsLoading(true);
                setError(null);
                try {
                    const response = await axios.get(`${API_BASE}/api/matrix/auto/${symbol}`, {
                        params: { mock: false }
                    });
                    setMatrix(response.data);
                    setCurrentPrice(response.data.current_price);
                } catch (e) {
                    setError('加载数据失败: ' + (e.response?.data?.detail || e.message));
                    console.error('加载矩阵失败:', e);
                }
                finally {
                    setIsLoading(false);
                }
            }, []);

            // 防抖：用户停止输入500ms后才执行搜索
            useEffect(() => {
                const timer = setTimeout(() => {
                    if (inputValue && inputValue !== selectedSymbol) {
                        setSelectedSymbol(inputValue);
                        loadMatrix(inputValue);
                    }
                }, 500);
                
                return () => clearTimeout(timer);
            }, [inputValue, selectedSymbol, loadMatrix]);

            // 初始加载
            useEffect(() => {
                loadMatrix(selectedSymbol);
            }, []);

            // 定时刷新（每30秒）
            useEffect(() => {
                const interval = setInterval(() => {
                    loadMatrix(selectedSymbol);
                }, 30000);
                return () => clearInterval(interval);
            }, [selectedSymbol, loadMatrix]);

            return (
                <div className="min-h-screen bg-gray-50">
                    {/* 顶部导航 */}
                    <header className="bg-white shadow-sm border-b">
                        <div className="max-w-7xl mx-auto px-4 py-4">
                            <div className="flex justify-between items-center">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 bg-gradient-to-br from-blue-500 to-purple-600 rounded-lg flex items-center justify-center text-white font-bold text-xl">
                                        Ξ
                                    </div>
                                    <div>
                                        <h1 className="text-xl font-bold text-gray-900">技术指标前置预判工具</h1>
                                        <p className="text-sm text-gray-500">反向求解临界价格，提前布局交易机会</p>
                                    </div>
                                </div>

                                <button
                                    onClick={() => loadMatrix(selectedSymbol)}
                                    disabled={isLoading}
                                    className="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700 disabled:opacity-50 text-sm font-medium"
                                >
                                    {isLoading ? '加载中...' : '刷新数据'}
                                </button>
                            </div>
                        </div>
                    </header>

                    {/* 主要内容 */}
                    <main className="max-w-7xl mx-auto px-4 py-6">
                        {error && (
                            <div className="mb-4 p-4 bg-red-50 border border-red-200 rounded-md text-red-700">
                                ⚠️ {error}
                            </div>
                        )}

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                            {/* 左侧：股票选择 */}
                            <div className="lg:col-span-2 space-y-6">
                                {/* 股票选择器 */}
                                <div className="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
                                    <label className="block text-sm font-medium text-gray-700 mb-3">
                                        选择股票代码
                                    </label>
                                    <input
                                        type="text"
                                        value={inputValue}
                                        onChange={(e) => setInputValue(e.target.value)}
                                        placeholder="输入股票代码，如 600519.SH"
                                        className="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                                    />
                                    <p className="text-xs text-gray-500 mt-2">💡 常见股票: 600519.SH (茅台), 000858.SZ (五粮液), 000651.SZ (格力)</p>
                                </div>

                                {/* 当前价格 */}
                                {matrix && (
                                    <div className="bg-white rounded-lg shadow-sm p-6 border border-gray-200">
                                        <div className="grid grid-cols-3 gap-4">
                                            <div className="text-center">
                                                <p className="text-gray-500 text-sm">当前价格</p>
                                                <p className="text-2xl font-bold text-blue-600">{matrix.current_price?.toFixed(2)}</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="text-gray-500 text-sm">最高价</p>
                                                <p className="text-2xl font-bold text-red-500">{matrix.max_price?.toFixed(2)}</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="text-gray-500 text-sm">最低价</p>
                                                <p className="text-2xl font-bold text-green-500">{matrix.min_price?.toFixed(2)}</p>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* 数据加载状态 */}
                                {!matrix && !error && (
                                    <div className="bg-white rounded-lg shadow-sm p-12 border border-gray-200 text-center">
                                        <p className="text-gray-500">
                                            {isLoading ? '正在加载数据...' : '选择股票代码后将显示数据'}
                                        </p>
                                    </div>
                                )}
                            </div>

                            {/* 右侧：系统信息 */}
                            <div className="bg-white rounded-lg shadow-sm p-6 border border-gray-200 h-fit">
                                <h3 className="text-lg font-semibold text-gray-900 mb-4">📊 系统信息</h3>

                                <div className="space-y-4 text-sm">
                                    <div>
                                        <p className="text-gray-500">后端服务</p>
                                        <p className="text-green-600 font-medium">✓ 正常运行</p>
                                        <p className="text-xs text-gray-400">{API_BASE}</p>
                                    </div>

                                    <hr className="my-3" />

                                    <div>
                                        <p className="text-gray-500 mb-2">主要功能</p>
                                        <ul className="space-y-1 text-gray-600">
                                            <li>✓ 技术指标计算</li>
                                            <li>✓ 实时价格推送</li>
                                            <li>✓ 策略信号提醒</li>
                                            <li>✓ 临界价格预测</li>
                                        </ul>
                                    </div>

                                    <hr className="my-3" />

                                    <div>
                                        <p className="text-gray-500 mb-2">快速链接</p>
                                        <a href="http://localhost:8000/docs" target="_blank" rel="noopener noreferrer"
                                           className="text-blue-600 hover:underline text-xs">
                                            📚 API 文档
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
